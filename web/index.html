<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление подогревом</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Настройки подогрева</h1>
        
        <div class="control">
            <label for="temp">Температура: <span id="tempValue">22.5</span>°C</label>
            <input type="range" id="temp" min="5" max="35" step="0.5" value="22.5">
        </div>

        <div class="control">
            <label>Режим:</label>
            <button id="modeAuto" class="active">Авто</button>
            <button id="modeManual">Ручной</button>
            <button id="modeOff">Выкл</button>
        </div>

        <button id="sendBtn" class="main-btn">Отправить настройки</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
