name: Deploy to VPS

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * *'  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete --include='bot/***' --include='web/***' --include='requirements.txt' --exclude='.env' --exclude='*'
          path: ./
          remote_path: /opt/Heatlink
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}